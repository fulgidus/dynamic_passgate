name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and Luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luarocks
          sudo luarocks install luacheck

      - name: Run Luacheck
        run: luacheck .
