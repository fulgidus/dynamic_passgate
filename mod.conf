name = dynamic_passgate
title = Dynamic Passgate
description = Invite-only server gate with dynamic per-user passwords. New players get a templated password based on their username - share it privately to grant access. They must change it within a countdown to gain full privileges. Includes an in-game admin panel for managing settings, players, and server status.
author = fulgidus
min_minetest_version = 5.9.0
optional_depends = sfinv_buttons, sfinv
